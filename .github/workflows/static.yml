# Build and deploy React + Vite to GitHub Pages
name: Deploy React app to GitHub Pages

on:
  # 每次推送到 main 分支時自動執行
  push:
    branches: ["main"]

  # 允許從 GitHub Actions 頁面手動執行
  workflow_dispatch:

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只執行一個 Pages 部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # 取得 GitHub 專案原始碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安裝 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 安裝 npm 套件
      # 有 package-lock.json 時使用 npm ci，沒有則使用 npm install
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 編譯 React / Vite 專案，產生 dist 資料夾
      - name: Build React app
        run: npm run build

      # 設定 GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 只上傳編譯完成的 dist，不上傳整個原始碼
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
